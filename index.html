<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker Keuangan PRO — Aktivasi Akun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --border-glow: #2d2d4e;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --accent: #7c6dfa;
      --accent-light: #a99dfc;
      --accent-glow: rgba(124, 109, 250, 0.15);
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Background noise + gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124,109,250,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(99,179,237,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-glow);
      border: 1px solid rgba(124,109,250,0.3);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent-light) 0%, #63b3ed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Invite code section - highlighted */
    .invite-section {
      background: var(--accent-glow);
      border: 1px solid rgba(124,109,250,0.25);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .invite-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 10px;
    }

    .invite-label svg {
      width: 14px;
      height: 14px;
    }

    .invite-input {
      width: 100%;
      background: rgba(10,10,15,0.6);
      border: 1px solid rgba(124,109,250,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-light);
      text-align: center;
      outline: none;
      transition: all 0.2s;
    }

    .invite-input::placeholder {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.05em;
      font-weight: 400;
    }

    .invite-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .invite-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form groups */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.03em;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--border-glow);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(124,109,250,0.08);
    }

    input::placeholder { color: var(--muted); }

    select option { background: #1a1a2e; }

    /* Token input special */
    input[name="telegram_token"] {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    /* Row */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent) 0%, #5b4fda 100%);
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .submit-btn:hover::before { background: rgba(255,255,255,0.08); }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Alert */
    .alert {
      display: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 16px;
      animation: fadeUp 0.3s ease;
    }

    .alert.success {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      color: var(--success);
    }

    .alert.error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--error);
    }

    .alert.warning {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: var(--warning);
    }

    .alert.show { display: flex; align-items: flex-start; gap: 10px; }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Loading state */
    .submit-btn.loading .btn-text { opacity: 0.6; }
    .submit-btn.loading .spinner { display: block; }

    /* Footer */
    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      animation: fadeUp 0.6s ease 0.2s both;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="badge">Financial Tracker PRO</div>
      <h1>Aktivasi <span>Akun Kamu</span></h1>
      <p class="subtitle">Masukkan kode undangan yang kamu terima<br>untuk memulai setup akun.</p>
    </div>

    <div class="card">
      <!-- Invite Code Section -->
      <div class="invite-section">
        <div class="invite-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Kode Undangan
        </div>
        <input
          type="text"
          name="invite_code"
          id="invite_code"
          class="invite-input"
          placeholder="Contoh: TRK-A1B2C3D4"
          maxlength="16"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="invite-hint">🔐 Kode ini diberikan langsung oleh admin</p>
      </div>

      <div class="divider">Info Akun</div>

      <form id="onboardingForm">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" name="nama" placeholder="Nama kamu" required />
        </div>

        <div class="form-group">
          <label>Email Google (untuk akses Sheet)</label>
          <input type="email" name="email" placeholder="nama@gmail.com" required />
        </div>

        <div class="divider">Koneksi Telegram Bot</div>

        <div class="form-group">
          <label>Bot Token (dari @BotFather)</label>
          <input type="text" name="telegram_token" placeholder="123456789:AAF..." required />
        </div>

        <div class="row">
          <div class="form-group">
            <label>Chat ID Kamu</label>
            <input type="text" name="chat_id" placeholder="123456789" required />
          </div>
          <div class="form-group">
            <label>Timezone</label>
            <select name="timezone">
              <option value="Asia/Makassar">WITA (Makassar)</option>
              <option value="Asia/Jakarta">WIB (Jakarta)</option>
              <option value="Asia/Jayapura">WIT (Jayapura)</option>
            </select>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-inner">
            <span class="spinner"></span>
            <span class="btn-text">✦ Aktivasi Sekarang</span>
          </span>
        </button>

        <div id="alertBox" class="alert"></div>
      </form>
    </div>

    <p class="footer-note">
      Butuh bantuan? Hubungi admin melalui Telegram
    </p>
  </div>

  <script>
    // Auto-format invite code: huruf kapital + strip
    document.getElementById('invite_code').addEventListener('input', function(e) {
      let val = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      e.target.value = val;
    });

    document.getElementById('onboardingForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      const invite_code = document.getElementById('invite_code').value.trim().toUpperCase();

      // Validasi kode undangan di sisi client
      if (!invite_code) {
        showAlert('error', '🔐 Masukkan kode undangan terlebih dahulu.');
        return;
      }

      const formData = new FormData(this);
      const body = Object.fromEntries(formData.entries());
      body.invite_code = invite_code;

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;
      alertBox.className = 'alert';
      alertBox.style.display = 'none';

      try {
        const res = await fetch('https://theoffilusn8n.my.id/webhook/onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (data.invalid_code) {
          showAlert('error', '❌ Kode undangan tidak valid atau sudah digunakan. Hubungi admin untuk mendapatkan kode baru.');
        } else if (data.duplicate) {
          showAlert('warning', '⚠️ Email ini sudah terdaftar. Silakan cek bot Telegram kamu atau hubungi admin.');
        } else if (data.success) {
          showAlert('success', '🎉 Berhasil! Akun kamu sudah aktif. Cek bot Telegram untuk memulai.');
          this.reset();
          document.getElementById('invite_code').value = '';
        } else {
          showAlert('error', '😕 Terjadi kesalahan. Coba lagi atau hubungi admin.');
        }
      } catch (err) {
        showAlert('error', '🌐 Koneksi gagal. Periksa internet kamu dan coba lagi.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    function showAlert(type, message) {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = `alert ${type} show`;
      alertBox.innerHTML = `<span>${message}</span>`;
    }
  </script>
</body>
</html>
